name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-x86_64-cuda:
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:12.8.1-devel-ubuntu24.04
    steps:
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git make ca-certificates g++ tar gzip
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Package
        run: |
          mkdir -p dist/midstate-cuda-miner-linux-x86_64-cuda12
          cp midstate-cuda-miner README.md dist/midstate-cuda-miner-linux-x86_64-cuda12/
          tar -C dist -czf midstate-cuda-miner-linux-x86_64-cuda12.tar.gz midstate-cuda-miner-linux-x86_64-cuda12
          sha256sum midstate-cuda-miner-linux-x86_64-cuda12.tar.gz > SHA256SUMS.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: midstate-cuda-miner-linux-x86_64-cuda12
          path: |
            midstate-cuda-miner-linux-x86_64-cuda12.tar.gz
            SHA256SUMS.txt
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            midstate-cuda-miner-linux-x86_64-cuda12.tar.gz
            SHA256SUMS.txt
